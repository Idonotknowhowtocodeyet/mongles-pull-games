<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poxel Play</title>
    <style>
        /* Force the body to be exactly the size of the window */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        /* Make the game fill every pixel */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.crazygames.com/embed/poxel-io" 
        allow="autoplay; gamepad; keyboard; fullscreen; accelerated-graphics"
        loading="eager">
    </iframe>

</body>
</html>
