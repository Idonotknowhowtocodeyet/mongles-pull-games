<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mongle V13 - Redemption</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #fff; margin: 0; padding: 20px; }
        .dashboard { position: sticky; top: 0; background: #151515; padding: 20px; border-radius: 8px; border-top: 4px solid #00ff41; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .controls { display: flex; gap: 10px; margin-top: 15px; }
        button { padding: 12px 20px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        #scanBtn { background: #00ff41; color: #000; }
        #scanBtn:disabled { background: #333; color: #666; }
        #zipBtn { background: #008cff; color: #fff; }
        #zipBtn:disabled { background: #333; color: #666; }
        #status { margin-top: 15px; font-family: monospace; color: #ffae00; font-size: 15px; }
        
        .lists-container { display: flex; gap: 20px; margin-top: 20px; }
        .list-box { flex: 1; background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px; max-height: 70vh; overflow-y: auto; }
        .list-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .good-header { color: #00ff41; }
        .bad-header { color: #ff3333; }
        
        .game-item { background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-radius: 4px; border-left: 3px solid #555; display: flex; justify-content: space-between; align-items: center; }
        .good-item { border-left-color: #00ff41; }
        .bad-item { border-left-color: #ff3333; }
        .game-info { display: flex; flex-direction: column; }
        .game-name { font-weight: bold; font-size: 15px; }
        .game-meta { font-size: 11px; color: #888; margin-top: 4px; }
        
        .rename-btn { background: #333; color: #fff; border: 1px solid #555; padding: 5px 10px; font-size: 11px; border-radius: 3px; cursor: pointer; }
        .rename-btn:hover { background: #555; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1 style="margin:0; color:#00ff41; font-size: 24px;">🛡️ MONGLE V13 // REDEMPTION</h1>
    <p style="margin:5px 0 0 0; color:#aaa; font-size: 13px;">5-Stage Verification & Ruffle Emulator Bypass</p>
    
    <div class="controls">
        <button id="scanBtn" onclick="startScan()">1. RUN 5-STAGE SCAN</button>
        <button id="zipBtn" onclick="generateZip()" disabled>2. DOWNLOAD SECURE ZIP</button>
    </div>
    <div id="status">System idle. Ready to scan.</div>
</div>

<div class="lists-container">
    <div class="list-box">
        <div class="list-header good-header">✅ GOOD LIST (Verified Names) <span id="goodCount">0</span></div>
        <div id="goodList"></div>
    </div>
    
    <div class="list-box" style="border-color: #441111;">
        <div class="list-header bad-header">⚠️ QUARANTINE (Needs Fix/Numbers) <span id="badCount">0</span></div>
        <div id="badList"></div>
    </div>
</div>

<script>
  //this is the repo name
    const REPO = "Idonotknowhowtocodeyet/mongle";
    let library = []; 

    // Known bad keywords we want to reject immediately
    const BAD_WORDS = ["ruffle", "player", "unity", "webgl", "game", "wrapper", "online", "play", "unblocked", "index", "document"];

    // Hardcoded safety net for the absolute worst offenders
    // Replace the old HARDCODED_NET with this massive update
    const HARDCODED_NET = {
        // Your previously verified good ones
        "103.html": "Bouncy Dunk", "104.html": "Helix Jump", "105.html": "Stack Ball", 
        "106.html": "Tiles Hop", "107.html": "Tomb of the Mask", "114.html": "Crossy Road", 
        "115.html": "Fruit Ninja", "119.html": "Jetpack Joyride", "120.html": "Angry Birds",
        "221.html": "Vex 3", "222.html": "Vex 4", "223.html": "Vex 5", "224.html": "Vex 6", 
        "225.html": "Vex 7", "333.html": "Retro Bowl College", "732.html": "Last Breath", 
        "737.html": "Buckshot Roulette",

        // THE QUARANTINE PATCH (Based on your exact failure list)
        "11.html": "2048",
        "26.html": "Flappy Bird",
        "29.html": "Cookie Clicker",
        "58.html": "Subway Surfers",

        "253.html": "Bloons TD 5",
        "254.html": "Bloons TD 6",
        "257.html": "Plants vs Zombies",
        "268.html": "Bad Ice Cream",

        "326.html": "Papa's Hot Doggeria",

        "339.html": "Fireboy and Watergirl 2",
        "349.html": "Fireboy and Watergirl 3",
        "358.html": "Fireboy and Watergirl 4",
        "359.html": "Fireboy and Watergirl 5",
        "369.html": "Moto X3M",

        "654.html": "Dumb Ways to Die",
        "671.html": "BitLife",
        "680.html": "Five Nights at Freddy's 1",
        "681.html": "Five Nights at Freddy's 2",
        "682.html": "Five Nights at Freddy's 3",
        "683.html": "Five Nights at Freddy's 4",
        "684.html": "FNAF Sister Location",
        "685.html": "FNAF Pizzeria Simulator",
        "686.html": "FNAF Ultimate Custom Night",
        "694.html": "Bendy and the Ink Machine",
        "696.html": "Hello Neighbor",
        "713.html": "Poppy Playtime",
        "726.html": "Garten of Banban",
        "733.html": "Lethal Company",
        "735.html": "Phasmophobia"
    };

    function isBadName(name) {
        if (!name || name.trim().length < 2) return true;
        if (/^\d+$/.test(name.trim())) return true; // It's just a number
        
        let lower = name.toLowerCase();
        for (let word of BAD_WORDS) {
            if (lower === word || lower === "ruffle player" || lower === "yt game wrapper") return true;
        }
        return false;
    }

    function formatName(str) {
        // Turns "super_smash_flash.swf" into "Super Smash Flash"
        return str.replace(/\.(swf|html|wasm)/gi, '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).trim();
    }

    // THE 5-STAGE CHECKER
    function run5StageCheck(filename, code) {
        let name = "";
        let stage = "";

        // STAGE 1: Hardcoded Net
        if (HARDCODED_NET[filename]) {
            return { name: HARDCODED_NET[filename], stage: "Stage 1: Intel Net" };
        }

        // STAGE 2: Flash/Ruffle Bypass (Look inside the code for the .swf file)
        let swfMatch = code.match(/['"]([^'"]+\.swf)['"]/i);
        if (swfMatch) {
            let swfName = swfMatch[1].split('/').pop(); // Get just the filename
            return { name: formatName(swfName), stage: "Stage 2: Flash Bypass" };
        }

        // STAGE 3: Unity Deep Metadata
        let unityMatch = code.match(/productName:\s*['"]([^'"]+)['"]/i);
        if (unityMatch && !isBadName(unityMatch[1])) {
            return { name: formatName(unityMatch[1]), stage: "Stage 3: Unity Engine" };
        }

        // STAGE 4: Clean Title Tag Check
        let titleMatch = code.match(/<title[^>]*>([^<]+)<\/title>/i);
        if (titleMatch) {
            let titleRaw = titleMatch[1].replace(/Unity WebGL Player|YT Game Wrapper/gi, '').trim();
            if (!isBadName(titleRaw)) {
                return { name: titleRaw, stage: "Stage 4: Title Extraction" };
            }
        }

        // STAGE 5: Complete Failure (Quarantine)
        return { name: filename.replace('.html', ''), stage: "Stage 5: Failed (Quarantined)" };
    }

    async function startScan() {
        const status = document.getElementById('status');
        const goodList = document.getElementById('goodList');
        const badList = document.getElementById('badList');
        const scanBtn = document.getElementById('scanBtn');
        const zipBtn = document.getElementById('zipBtn');
        
        scanBtn.disabled = true;
        zipBtn.disabled = true;
        goodList.innerHTML = "";
        badList.innerHTML = "";
        library = [];
        
        let goodCount = 0;
        let badCount = 0;

        try {
            status.innerText = "Connecting to GitHub Data Stream...";
            const res = await fetch(`https://api.github.com/repos/${REPO}/git/trees/main?recursive=1`);
            const data = await res.json();
            const files = data.tree.filter(f => f.path.endsWith('.html'));

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const filename = file.path.split('/').pop();
                status.innerText = `Running 5-Stage Check [${i+1}/${files.length}]: ${filename}`;

                const rawUrl = `https://raw.githubusercontent.com/${REPO}/main/${file.path}`;
                const codeRes = await fetch(rawUrl);
                const code = await codeRes.text();

                // Run the heavy technology checker
                let result = run5StageCheck(filename, code);
                
                let isQuarantined = isBadName(result.name);
                
                // Save to library
                let gameData = {
                    id: i,
                    originalPath: file.path,
                    code: code,
                    finalName: result.name,
                    isBad: isQuarantined
                };
                library.push(gameData);

                // Build UI
                const item = document.createElement('div');
                item.className = `game-item ${isQuarantined ? 'bad-item' : 'good-item'}`;
                item.id = `game-${i}`;
                item.innerHTML = `
                    <div class="game-info">
                        <span class="game-name" id="name-${i}">${result.name}</span>
                        <span class="game-meta">${result.stage} | File: ${filename}</span>
                    </div>
                    <button class="rename-btn" onclick="forceRename(${i})">FIX NAME</button>
                `;

                if (isQuarantined) {
                    badList.appendChild(item);
                    badCount++;
                    document.getElementById('badCount').innerText = badCount;
                } else {
                    goodList.appendChild(item);
                    goodCount++;
                    document.getElementById('goodCount').innerText = goodCount;
                }

                await new Promise(r => setTimeout(r, 50)); // Stop the browser from crashing
            }

            status.innerText = "SCAN COMPLETE. Please fix quarantined files before downloading.";
            status.style.color = "#00ff41";
            zipBtn.disabled = false;

        } catch (e) {
            status.innerText = "ERROR: " + e.message;
            scanBtn.disabled = false;
        }
    }

    // Allows you to manually type a name if Stage 5 fails
    window.forceRename = (id) => {
        let game = library[id];
        let newName = prompt("Force new name for: " + game.originalPath, game.finalName);
        if (newName && newName.trim() !== "") {
            game.finalName = newName.trim();
            game.isBad = false; // It's good now!
            
            // Move it to the good list visually
            document.getElementById(`name-${id}`).innerText = game.finalName;
            let element = document.getElementById(`game-${id}`);
            element.className = "game-item good-item";
            document.getElementById('goodList').appendChild(element); // Moves it over
        }
    }

    // THE FIXED ZIP ENGINE
    async function generateZip() {
        const status = document.getElementById('status');
        const zipBtn = document.getElementById('zipBtn');
        zipBtn.disabled = true;
        
        status.innerText = "PREPARING ZIP FILE... PLEASE DO NOT CLOSE TAB.";
        status.style.color = "#008cff";

        try {
            const zip = new JSZip();
            const folder = zip.folder("games");
            let menuHtml = "<html><body style='background:#111;color:#eee;font-family:sans-serif;'><h1>My Games</h1><ul>";

            // Add all games
            for (let game of library) {
                // Ensure the name is safe for Windows/Mac file systems
                let safeName = game.finalName.replace(/[<>:"/\\|?*]/g, "").trim();
                if (safeName === "") safeName = "Unknown_Game_" + game.id;
                
                folder.file(safeName + ".html", game.code);
                menuHtml += `<li><a href='games/${safeName}.html' style='color:#00ff41;'>${safeName}</a></li>`;
            }

            menuHtml += "</ul></body></html>";
            zip.file("index.html", menuHtml);

            // Generate ZIP with progress tracking
            const blob = await zip.generateAsync({type:"blob"}, function updateCallback(metadata) {
                status.innerText = `COMPRESSING ZIP: ${metadata.percent.toFixed(1)}% COMPLETE...`;
            });

            // Trigger safe download
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Mongle_V13_Repaired.zip";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.innerText = "ZIP SUCCESSFULLY DOWNLOADED!";
            status.style.color = "#00ff41";
            zipBtn.disabled = false;

        } catch (error) {
            status.innerText = "ZIP CREATION FAILED. You may not have enough RAM. Error: " + error.message;
            status.style.color = "red";
            zipBtn.disabled = false;
        }
    }
</script>
</body>
</html>
